name: "🚀 Release & Docker Build"

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'docker-compose*.yml'
      - '.dockerignore'
  workflow_dispatch:
    inputs:
      force-release:
        description: 'force create release'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  security-events: write
  # Required by docker-build.yml@main: a declared permissions: block sets every
  # unlisted scope to none, and the reusable workflow now needs these three.
  attestations: write   # write the build-provenance attestation
  id-token: write       # OIDC token to sign the attestation (keyless/Sigstore)
  actions: read         # its nested security-analysis job reads run metadata

jobs:
  # ============================================
  # Validation Jobs
  # ============================================

  validate-compose:
    name: "🔍 Validate Docker Compose"
    uses: bauer-group/automation-templates/.github/workflows/modules-validate-compose.yml@main
    with:
      compose-files: '["docker-compose.example.yml"]'
      env-file: '.env.example'

  # ============================================
  # Release Job (only on main branch push)
  # ============================================

  release:
    name: "📦 Create Semantic Release"
    needs: [validate-compose]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.validate-compose.result == 'success'
    uses: bauer-group/automation-templates/.github/workflows/modules-semantic-release.yml@main
    with:
      target-branch: 'main'
      dry-run: false
      force-release: ${{ inputs.force-release || false }}
    secrets: inherit

  # ============================================
  # Cloudflared Docker Build Jobs
  # ============================================

  docker-build-release:
    name: "🐳 Build & Push Cloudflared Image"
    needs: release
    if: needs.release.outputs.release-created == 'true'
    uses: bauer-group/automation-templates/.github/workflows/docker-build.yml@main
    with:
      deploy-environment: 'production'
      publish-to: 'ghcr'
      ghcr-image-name: 'bauer-group/cs-cloudflaretunnel/cloudflared'
      docker-image-name: 'bauergroup/cloudflared'

      release-version: ${{ needs.release.outputs.version }}
      image-tags: 'stable'

      update-dockerfile-version: true
      auto-tags: true
      latest-tag: true

      dockerfile-path: './src/cloudflared/Dockerfile'
      docker-context: './src/cloudflared'
      platforms: 'linux/amd64'

      push: true

      security-scan: false
      security-fail-on: 'CRITICAL'
      generate-sbom: true
      sync-dockerhub-readme: true
    secrets: inherit

  docker-build-pr:
    name: "🔨 Validate Cloudflared Build (PR)"
    needs: [validate-compose]
    if: |
      github.event_name == 'pull_request' &&
      needs.validate-compose.result == 'success'
    uses: bauer-group/automation-templates/.github/workflows/docker-build.yml@main
    with:
      publish-to: 'ghcr'
      ghcr-image-name: 'bauer-group/cs-cloudflaretunnel/cloudflared'

      auto-tags: true
      dockerfile-path: './src/cloudflared/Dockerfile'
      docker-context: './src/cloudflared'
      platforms: 'linux/amd64'

      push: false

      security-scan: false
      security-fail-on: 'CRITICAL'
    secrets: inherit
